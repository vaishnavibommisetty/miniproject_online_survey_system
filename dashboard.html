<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Home Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:
linear-gradient(
135deg,
#f4f6ff,
#eef2ff
);
color:#222;
}

/* MAIN */

.container{
max-width:1100px;
margin:auto;
padding:28px;
display:flex;
flex-direction:column;
gap:24px;
}

/* HEADER */

.header{
padding-bottom:14px;
border-bottom:1px solid #e7e7e7;
}

.title{
font-size:34px;
font-weight:800;
color:#4f46e5;
}

/* FLASH CARDS */

.flashGrid{
display:grid;
grid-template-columns:
repeat(3,1fr);
gap:18px;
}

.flashCard{

padding:24px;

border-radius:18px;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:10px;

min-height:180px;

transition:.3s;

color:white;

box-shadow:
0 12px 28px
rgba(0,0,0,.08);

}

.flashCard:hover{

transform:
translateY(-5px);

}

/* COLORS */

.flashCard:nth-child(1){

background:
linear-gradient(
135deg,
#6366f1,
#8b5cf6
);

}

.flashCard:nth-child(2){

background:
linear-gradient(
135deg,
#06b6d4,
#2563eb
);

}

.flashCard:nth-child(3){

background:
linear-gradient(
135deg,
#ec4899,
#f97316
);

}

.flashCard img{

width:56px;

height:56px;

padding:10px;

border-radius:50%;

background:white;

}

.flashCard h3{

font-size:16px;

font-weight:600;

color:white;

}

.flashCard p{

font-size:38px;

font-weight:800;

color:white;

}

/* BUTTONS */

.actions{

display:flex;

gap:12px;

flex-wrap:wrap;

}

.btn{

padding:12px 18px;

border:none;

border-radius:12px;

background:
linear-gradient(
90deg,
#4f46e5,
#ec4899
);

color:white;

font-size:14px;

font-weight:600;

cursor:pointer;

}

.btn:hover{

opacity:.92;

}

/* SECTION */

.section{

display:flex;

flex-direction:column;

gap:14px;

}

.section h2{

font-size:22px;

}

/* SURVEYS */

.surveyGrid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
260px,
1fr
)
);

gap:18px;

}

.survey{

background:white;

border-radius:18px;

padding:20px;

display:flex;

flex-direction:column;

align-items:center;

text-align:center;

gap:12px;

min-height:240px;

box-shadow:
0 8px 20px
rgba(0,0,0,.05);

}

.survey img{

width:72px;

height:72px;

}

.survey h3{

font-size:18px;

font-weight:700;

}

.survey p{

font-size:14px;

line-height:1.5;

color:#666;

flex:1;

}

.open{

padding:10px 18px;

border:none;

border-radius:10px;

background:
linear-gradient(
90deg,
#6366f1,
#8b5cf6
);

color:white;

cursor:pointer;

}

.open:hover{

opacity:.92;

}

/* RESPONSIVE */

@media(max-width:900px){

.flashGrid{

grid-template-columns:
1fr 1fr;

}

}

@media(max-width:650px){

.flashGrid{

grid-template-columns:
1fr;

}

.title{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1 class="title">

Dashboard

</h1>

</div>

<!-- FLASH CARDS -->

<div class="flashGrid">

<div class="flashCard">

<img
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h3>

Total Surveys

</h3>

<p id="surveyCount">

0

</p>

</div>


<div class="flashCard">

<img
src="https://cdn-icons-png.flaticon.com/512/2838/2838912.png">

<h3>

Total Responses

</h3>

<p id="responseCount">

0

</p>

</div>


<div class="flashCard">

<img
src="https://cdn-icons-png.flaticon.com/512/747/747376.png">

<h3>

Active Users

</h3>

<p id="activeUsers">

0

</p>

</div>

</div>

<!-- BUTTONS -->

<div class="actions">

<button
class="btn"
onclick="
location.href='create-survey.html'
">

Create Survey

</button>


<button
class="btn"
onclick="
location.href='analytics.html'
">

Analytics

</button>


<button
class="btn"
id="logout">

Logout

</button>

</div>

<!-- SURVEYS -->

<div class="section">

<h2>

Available Surveys

</h2>

<div
class="surveyGrid"
id="surveyList">

Loading...

</div>

</div>

</div>

<script type="module">

import {
auth,
db
}
from "../firebase.js";

import {
signOut
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
ref,
onValue
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* OPEN */

window.openSurvey=(id)=>{

location.href=
`take-survey.html?id=${id}`;

};

/* SURVEYS */

onValue(

ref(
db,
"surveys"
),

(snapshot)=>{

let html="";

let count=0;

if(
snapshot.exists()
){

const data=
snapshot.val();

for(
const id in data
){

count++;

html+=`

<div class="survey">

<img
src="https://cdn-icons-png.flaticon.com/512/9068/9068756.png">

<h3>

${data[id].title}

</h3>

<p>

${data[id].description}

</p>

<button
class="open"
onclick="openSurvey('${id}')">

Open

</button>

</div>

`;

}

}else{

html=
"<p>No surveys available</p>";

}

document
.getElementById(
"surveyList"
)
.innerHTML=
html;

document
.getElementById(
"surveyCount"
)
.innerText=
count;

}

/* realtime */

);

onValue(

ref(
db,
"responses"
),

(snapshot)=>{

let total=0;

if(
snapshot.exists()
){

const responses=
snapshot.val();

for(
const id in responses
){

total+=
Object
.keys(
responses[id]
)
.length;

}

}

document
.getElementById(
"responseCount"
)
.innerText=
total;

/* active users = responses */

document
.getElementById(
"activeUsers"
)
.innerText=
total;

}

);

/* LOGOUT */

document
.getElementById(
"logout"
)

.onclick=

async()=>{

await signOut(
auth
);

location=
"login.html";

};

</script>

</body>

</html>
