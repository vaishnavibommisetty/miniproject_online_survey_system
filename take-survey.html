<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>Take Survey</title>

<style>

@import url(
'https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'
);

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins';
}

body{

background:
linear-gradient(
135deg,
#fff7ed,
#fdf2f8,
#f3e8ff
);

padding:40px;

}

.container{

max-width:900px;

margin:auto;

}

.card{

background:white;

padding:45px;

border-radius:30px;

box-shadow:
0 20px 45px rgba(0,0,0,.08);

}

h1{

color:#7c3aed;

font-size:42px;

margin-bottom:20px;

}

.desc{

color:#666;

margin-bottom:30px;

}

/* QUESTION BOX */

.question{

background:
linear-gradient(
135deg,
#faf5ff,
#ffffff
);

border:1px solid #ece5ff;

padding:25px;

margin-top:22px;

border-radius:22px;

transition:.25s;

}

.question:hover{

transform:translateY(-3px);

box-shadow:
0 10px 25px rgba(124,58,237,.12);

}

.question label{

display:block;

font-size:18px;

font-weight:700;

margin-bottom:18px;

color:#333;

}

/* INPUTS */

input,
textarea,
select{

width:100%;

padding:16px;

border-radius:14px;

border:1px solid #ddd;

font-size:16px;

outline:none;

transition:.2s;

}

input:focus,
textarea:focus,
select:focus{

border-color:#7c3aed;

box-shadow:
0 0 0 5px rgba(124,58,237,.08);

}

textarea{

min-height:120px;

resize:none;

}

/* OPTIONS */

.option{

background:#fafafa;

padding:14px;

margin-bottom:12px;

border-radius:12px;

display:flex;

align-items:center;

gap:10px;

cursor:pointer;

}

.option input{

width:auto;

}

.option:hover{

background:#f3e8ff;

}

.rangeValue{

margin-top:15px;

font-size:26px;

font-weight:700;

color:#7c3aed;

text-align:center;

}

button{

margin-top:35px;

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:
linear-gradient(
90deg,
#7c3aed,
#ec4899
);

color:white;

font-size:20px;

cursor:pointer;

}

button:hover{

opacity:.95;

}

/* SUCCESS */

.success{

position:fixed;

top:30px;

right:30px;

background:white;

padding:22px;

border-radius:20px;

box-shadow:
0 20px 40px rgba(0,0,0,.12);

display:flex;

gap:15px;

align-items:center;

animation:slide .4s;

}

.successIcon{

width:58px;
height:58px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:#ecfdf5;

font-size:30px;

}

@keyframes slide{

from{
transform:translateX(100px);
opacity:0;
}

to{
transform:none;
opacity:1;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Take Survey</h1>

<div id="surveyContainer">

Loading...

</div>

<button id="submitBtn">

Submit Response

</button>

</div>

</div>

<script type="module">

import { db }

from "../firebase.js";

import {

ref,
get,
push

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const surveyId=
new URLSearchParams(
window.location.search
).get(
"id"
);

const container=
document.getElementById(
"surveyContainer"
);

let survey;

async function load(){

const snap=
await get(
ref(
db,
"surveys/"+surveyId
)
);

if(!snap.exists()){

container.innerHTML=
"Survey Not Found";

return;

}

survey=
snap.val();

container.innerHTML=
`

<h2>${survey.title}</h2>

<p class="desc">

${survey.description}

</p>

`;

survey.questions.forEach(

(q,index)=>{

let field="";

if(q.type==="Text"){

field=
`

<input
id="q${index}"
placeholder="Enter answer">

`;

}

else if(q.type==="Multiple Choice"){

field=
`

<select id="q${index}">

${

(q.options||[])

.map(

x=>

`<option>${x}</option>`

)

.join("")

}

</select>

`;

}

else if(q.type==="Rating"){

field=
`

<input
type="range"

id="q${index}"

min="${q.min||1}"

max="${q.max||5}"

value="3"

oninput="
document
.getElementById(
'v${index}'
)
.innerText=
this.value
">

<div
id="v${index}"
class="rangeValue">

3

</div>

`;

}

else if(q.type==="Yes / No"){

field=
`

<label class="option">

<input
type="radio"

name="q${index}"

value="Yes">

Yes

</label>

<label class="option">

<input
type="radio"

name="q${index}"

value="No">

No

</label>

`;

}

container.innerHTML+=`

<div class="question">

<label>

${index+1}. ${q.question}

</label>

${field}

</div>

`;

});

}

document
.getElementById(
"submitBtn"
)
.addEventListener(
"click",

async()=>{

let answers=[];

survey.questions.forEach(

(q,index)=>{

let value="";

if(q.type==="Yes / No"){

const selected=

document.querySelector(

`input[name=q${index}]:checked`

);

value=

selected

?

selected.value

:

"";

}

else{

value=

document
.getElementById(
`q${index}`
)
.value;

}

answers.push({

question:q.question,

answer:value

});

});

await push(

ref(
db,
"responses/"+surveyId
),

{

answers,

submittedAt:
Date.now()

}

);

document.body.insertAdjacentHTML(

"beforeend",

`

<div class="success">

<div class="successIcon">

🎉

</div>

<div>

<h3>

Response Submitted

</h3>

<p>

Thank you for participating

</p>

</div>

</div>

`

);

setTimeout(

()=>{

location=
"dashboard.html";

},

2200

);

}

);

load();

</script>

</body>

</html>
