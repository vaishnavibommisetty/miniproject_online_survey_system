<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

@import url(
'https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'
);

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins';
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

background:
linear-gradient(
135deg,
#fff7ed,
#fdf2f8,
#f3e8ff
);

}

.container{

width:100%;

max-width:1400px;

min-height:90vh;

display:flex;

background:white;

border-radius:35px;

overflow:hidden;

box-shadow:
0 25px 60px rgba(0,0,0,.1);

}

.left{

flex:1;

padding:70px;

background:
linear-gradient(
180deg,
#8b5cf6,
#ec4899
);

display:flex;

flex-direction:column;

justify-content:center;

color:white;

}

.left h1{

font-size:64px;

margin-bottom:20px;

}

.left p{

font-size:20px;

line-height:1.8;

}

.left img{

width:100%;

margin-top:40px;

border-radius:25px;

}

.right{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:80px;

}

.form{

width:100%;

max-width:480px;

}

.form h2{

font-size:50px;

color:#7c3aed;

margin-bottom:10px;

}

.sub{

margin-bottom:35px;

color:#666;

}

.field{

margin-bottom:25px;

}

label{

display:block;

margin-bottom:10px;

font-weight:600;

}

input{

width:100%;

padding:18px;

border-radius:18px;

border:1px solid #ddd;

font-size:17px;

}

.password{

position:relative;

}

.eye{

position:absolute;

right:18px;

top:20px;

cursor:pointer;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

color:white;

font-size:20px;

cursor:pointer;

background:
linear-gradient(
90deg,
#7c3aed,
#ec4899
);

}

.bottom{

margin-top:25px;

text-align:center;

}

.bottom a{

color:#7c3aed;

text-decoration:none;

font-weight:700;

}

/* SUCCESS POPUP */

.popup{

position:fixed;

top:50%;

left:50%;

transform:
translate(-50%,-50%)
scale(.8);

width:360px;

background:white;

padding:35px;

border-radius:28px;

text-align:center;

box-shadow:
0 25px 60px rgba(0,0,0,.15);

opacity:0;

pointer-events:none;

transition:.35s;

z-index:999;

}

.popup.show{

opacity:1;

transform:
translate(-50%,-50%)
scale(1);

pointer-events:auto;

}

.icon{

width:100px;

height:100px;

margin:auto;

border-radius:50%;

background:#00d84d;

display:flex;

align-items:center;

justify-content:center;

font-size:55px;

color:white;

}

.popup h2{

margin-top:20px;

font-size:48px;

color:#172554;

}

.popup p{

font-size:20px;

color:#555;

margin-top:12px;

}

.popup button{

margin-top:25px;

font-size:18px;

}

@media(max-width:950px){

.left{

display:none;

}

.right{

padding:40px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>

Welcome<br>
Back

</h1>

<p>

Login to continue creating surveys,
collect responses,
and view analytics.

</p>

<img
src="https://images.unsplash.com/photo-1552664730-d307ca884978">

</div>

<div class="right">

<div class="form">

<h2>

Login

</h2>

<p class="sub">

Enter your email and password

</p>

<div class="field">

<label>Email</label>

<input
id="email"
type="email">

</div>

<div class="field">

<label>Password</label>

<div class="password">

<input
id="password"
type="password">

<span
class="eye"
onclick="togglePassword()">

👁

</span>

</div>

</div>

<button
onclick="login()">

Login

</button>

<div class="bottom">

New user?

<a href="register.html">

Create Account →

</a>

</div>

</div>

</div>

</div>

<!-- SUCCESS POPUP -->

<div
class="popup"
id="popup">

<div class="icon">

✓

</div>

<h2>

Welcome!

</h2>

<p>

Login Successful

</p>

<button
onclick="goDashboard()">

Continue

</button>

</div>

<script type="module">

import {
auth
}

from "../firebase.js";

import {
signInWithEmailAndPassword
}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.login=()=>{

const email=
document.getElementById(
"email"
).value;

const password=
document.getElementById(
"password"
).value;

signInWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

document
.getElementById(
"popup"
)

.classList
.add(
"show"
);

})

.catch(

(err)=>{

alert(
err.message
);

}

);

};

window.goDashboard=()=>{

location=
"dashboard.html";

};

window.togglePassword=()=>{

const p=
document.getElementById(
"password"
);

p.type=
p.type==="password"
?

"text"

:

"password";

};

</script>

</body>

</html>
