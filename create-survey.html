<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Create Survey</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins';
}

body{

background:
linear-gradient(
135deg,
#fff7ed,
#fdf2f8,
#f3e8ff
);

padding:40px;

}

.container{

max-width:1100px;

margin:auto;

}

.header{

background:
linear-gradient(
90deg,
#7c3aed,
#ec4899
);

color:white;

padding:40px;

border-radius:30px;

margin-bottom:30px;

}

.header h1{

font-size:42px;

}

.card{

background:white;

padding:40px;

border-radius:25px;

box-shadow:
0 15px 35px rgba(0,0,0,.08);

}

.field{

margin-bottom:25px;

}

label{

display:block;

margin-bottom:10px;

font-weight:600;

color:#444;

}

input,
textarea,
select{

width:100%;

padding:15px;

border-radius:14px;

border:1px solid #ddd;

font-size:16px;

}

textarea{

min-height:120px;

resize:none;

}

.question{

background:#faf5ff;

padding:25px;

margin-top:20px;

border-radius:20px;

}

.extra{

margin-top:20px;

}

button{

padding:14px 24px;

border:none;

border-radius:14px;

cursor:pointer;

}

.add{

background:#7c3aed;

color:white;

}

.save{

width:100%;

margin-top:25px;

background:
linear-gradient(
90deg,
#7c3aed,
#ec4899
);

color:white;

font-size:18px;

}

.remove{

margin-top:15px;

background:#ef4444;

color:white;

}

#success{

position:fixed;

top:30px;

right:30px;

background:
linear-gradient(
90deg,
#10b981,
#22c55e
);

color:white;

padding:20px 30px;

border-radius:18px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Create Survey</h1>

<p>Create survey forms dynamically</p>

</div>



<div class="card">

<div class="field">

<label>

Survey Title

</label>

<input
id="title"
placeholder="Student Feedback Survey">

</div>



<div class="field">

<label>

Survey Description

</label>

<textarea
id="description"
placeholder="This survey collects student opinions about learning experience.">

</textarea>

</div>



<div id="questions">

</div>

<br>

<button
class="add"
onclick="addQuestion()">

+ Add Question

</button>


<button
class="save"
onclick="saveSurvey()">

Save Survey

</button>

</div>

</div>



<script type="module">

import {
db
}
from "../firebase.js";

import {

ref,
push,
set

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



let questionNumber=0;



window.addQuestion=()=>{

questionNumber++;

const div=
document.createElement(
"div"
);

div.className=
"question";


div.innerHTML=`

<label>

Question ${questionNumber}

</label>

<input
class="questionText"
placeholder="Enter question">


<br><br>


<label>

Question Type

</label>

<select
class="type"
onchange="changeType(this)">

<option>

Text

</option>

<option>

Multiple Choice

</option>

<option>

Rating

</option>

<option>

Yes / No

</option>

</select>


<div class="extra">

</div>


<button
class="remove"
onclick="this.parentElement.remove()">

Remove

</button>

`;


document
.getElementById(
"questions"
)

.appendChild(
div
);

};




window.changeType=(el)=>{

const extra=

el.parentElement
.querySelector(
".extra"
);

const type=
el.value;



if(type==="Multiple Choice"){

extra.innerHTML=`

<label>

Options (comma separated)

</label>

<textarea
class="options"
placeholder=
"Excellent,Good,Average">

</textarea>

`;

}



else if(type==="Rating"){

extra.innerHTML=`

<label>

Minimum Rating

</label>

<input
class="min"
value="1">


<br><br>


<label>

Maximum Rating

</label>

<input
class="max"
value="5">

`;

}



else if(type==="Yes / No"){

extra.innerHTML=`

<input
class="options"
value="Yes,No"
readonly>

`;

}


else{

extra.innerHTML="";

}

};





window.saveSurvey=
async()=>{

try{

const title=

document
.getElementById(
"title"
)
.value
.trim();


const description=

document
.getElementById(
"description"
)
.value
.trim();


const questions=[];



document
.querySelectorAll(
".question"
)

.forEach(

(q)=>{


const question=

q
.querySelector(
".questionText"
)
.value
.trim();


const type=

q
.querySelector(
".type"
)
.value;


if(question===""){

return;

}


let obj={

question,

type

};



const options=

q.querySelector(
".options"
);

if(options){

obj.options=

options.value

.split(",")

.map(
x=>x.trim()
)

.filter(
x=>x
);

}



const min=
q.querySelector(
".min"
);

const max=
q.querySelector(
".max"
);


if(min&&max){

obj.min=
Number(
min.value
);

obj.max=
Number(
max.value
);

}


questions.push(
obj
);

}

);



const surveyRef=

push(

ref(
db,
"surveys"
)

);



await set(

surveyRef,

{

title,

description,

questions,

createdAt:

Date.now()

}

);



document.body.insertAdjacentHTML(

"beforeend",

`

<div id="success">

✅ Survey Created Successfully

</div>

`

);



setTimeout(

()=>{

location=
"dashboard.html";

},

2500

);


}

catch(error){

alert(
error.message
);

}

};



addQuestion();

</script>

</body>

</html>
