<!DOCTYPE html> 
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>
Survey Analytics
</title>

<script src=
"https://cdn.jsdelivr.net/npm/chart.js">

</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

background:
linear-gradient(
135deg,
#faf5ff,
#fdf4ff
);

padding:40px;

}

.container{

max-width:1400px;

margin:auto;

}

.header{

margin-bottom:35px;

}

.header h1{

font-size:42px;

color:#333;

}

.stats{

display:grid;

grid-template-columns:
repeat(
4,
1fr
);

gap:20px;

margin-bottom:35px;

}

.card{

background:white;

padding:28px;

border-radius:22px;

text-align:center;

box-shadow:
0 8px 22px rgba(0,0,0,.08);

}

.card h3{

color:#777;

margin-bottom:10px;

}

.card p{

font-size:38px;

font-weight:700;

color:#7c3aed;

}

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:25px;

}

.chart{

background:white;

padding:25px;

border-radius:22px;

box-shadow:
0 8px 20px rgba(0,0,0,.08);

height:380px;

}

.chart h3{

text-align:center;

margin-bottom:15px;

font-size:28px;

}

.chart canvas{

max-height:260px;

}

.back{

margin-top:35px;

padding:15px 25px;

border:none;

border-radius:14px;

cursor:pointer;

background:
linear-gradient(
90deg,
#7c3aed,
#ec4899
);

color:white;

font-size:17px;

}

@media(max-width:900px){

.stats{

grid-template-columns:
1fr 1fr;

}

.grid{

grid-template-columns:
1fr;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>

Survey Analytics

</h1>

</div>

<div class="stats">

<div class="card">

<h3>Total Surveys</h3>

<p id="surveys">

0

</p>

</div>

<div class="card">

<h3>Total Responses</h3>

<p id="responses">

0

</p>

</div>

<div class="card">

<h3>Average</h3>

<p id="average">

0

</p>

</div>

<div class="card">

<h3>Highest</h3>

<p id="highest">

0

</p>

</div>

</div>

<div class="grid">

<div class="chart">

<h3>

📊 Bar Analytics

</h3>

<canvas id="bar"></canvas>

</div>

<div class="chart">

<h3>

🥧 Pie Analytics

</h3>

<canvas id="pie"></canvas>

</div>

<div class="chart">

<h3>

📈 Line Analytics

</h3>

<canvas id="line"></canvas>

</div>

<div class="chart">

<h3>

🍩 Doughnut Analytics

</h3>

<canvas id="doughnut"></canvas>

</div>

</div>

<button
class="back"
onclick="
location.href=
'dashboard.html'
">

Back Dashboard

</button>

</div>

<script type="module">

import {
db
}
from "../firebase.js";

import {
ref,
get
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const surveyData=
await get(
ref(
db,
"surveys"
)
);

const responseData=
await get(
ref(
db,
"responses"
)
);

let labels=[];
let values=[];

if(
responseData.exists()
){

const data=
responseData.val();

for(
const id in data
){

labels.push(
"Survey "+
(
labels.length+1
)
);

values.push(
Object
.keys(
data[id]
)
.length
);

}

}

document
.getElementById(
"surveys"
)
.innerText=

surveyData.exists()

?

Object
.keys(
surveyData.val()
)
.length

:

0;

const total=

values.reduce(
(a,b)=>
a+b,
0
);

document
.getElementById(
"responses"
)
.innerText=
total;

document
.getElementById(
"average"
)
.innerText=

values.length

?

(
total/
values.length
).toFixed(
1
)

:

0;

document
.getElementById(
"highest"
)
.innerText=

Math.max(
0,
...values
);

function chart(
id,
type,
bg,
border
){

new Chart(

document
.getElementById(
id
),

{

type,

data:{

labels,

datasets:[{

data:
values,

label:
"Responses",

backgroundColor:
bg,

borderColor:
border,

borderWidth:
3,

hoverOffset:
20,

borderRadius:
12,

fill:
type==="line",

tension:
0.4

}]

},

options:{

responsive:true,

maintainAspectRatio:false,

plugins:{

legend:{

position:
"bottom"

}

},

scales:

type==="bar"
||
type==="line"

?

{

y:{

beginAtZero:true

}

}

:

{}

}

}

);

}

/* BLUE BAR */

chart(

"bar",

"bar",

[

"#60A5FA",
"#2563EB",
"#1D4ED8",
"#3B82F6"

],

"#2563EB"

);

/* COLOR PIE */

chart(

"pie",

"pie",

[

"#EC4899",
"#F97316",
"#FACC15",
"#22C55E",
"#06B6D4"

],

"#ffffff"

);

/* CYAN LINE */

chart(

"line",

"line",

"rgba(6,182,212,.35)",

"#06B6D4"

);

/* MULTICOLOR DOUGHNUT */

chart(

"doughnut",

"doughnut",

[

"#7C3AED",
"#EC4899",
"#3B82F6",
"#22C55E",
"#F59E0B"

],

"#ffffff"

);

</script>

</body>

</html>
