<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register</title>

<style>

@import url(
'https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'
);

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins';
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#fff7ed,
#fdf2f8,
#f3e8ff
);

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.container{

width:100%;

max-width:1450px;

min-height:92vh;

display:flex;

background:white;

border-radius:35px;

overflow:hidden;

box-shadow:
0 25px 60px rgba(0,0,0,.1);

}

.left{

flex:1;

padding:70px;

background:
linear-gradient(
180deg,
#7c3aed,
#ec4899
);

color:white;

display:flex;

flex-direction:column;

justify-content:center;

}

.left h1{

font-size:68px;

margin-bottom:25px;

}

.left p{

font-size:22px;

line-height:1.8;

}

.left img{

margin-top:40px;

width:100%;

max-height:320px;

object-fit:cover;

border-radius:25px;

}

.right{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:80px;

}

.form{

width:100%;

max-width:500px;

}

.form h2{

font-size:48px;

color:#7c3aed;

margin-bottom:10px;

}

.sub{

font-size:18px;

color:#666;

margin-bottom:35px;

}

.field{

margin-bottom:24px;

}

label{

display:block;

margin-bottom:10px;

font-size:18px;

font-weight:600;

}

input{

width:100%;

padding:18px;

border-radius:18px;

border:1px solid #ddd;

font-size:17px;

}

input:focus{

outline:none;

border-color:#7c3aed;

}

.password{

position:relative;

}

.eye{

position:absolute;

right:18px;

top:20px;

cursor:pointer;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:
linear-gradient(
90deg,
#7c3aed,
#ec4899
);

color:white;

font-size:22px;

cursor:pointer;

}

.bottom{

margin-top:25px;

text-align:center;

color:#666;

}

.bottom a{

color:#7c3aed;

text-decoration:none;

font-weight:700;

}

/* POPUP */

#popup{

position:fixed;

inset:0;

background:
rgba(0,0,0,.35);

display:flex;

justify-content:center;

align-items:center;

z-index:999;

}

.popupBox{

background:white;

padding:45px;

width:430px;

border-radius:30px;

text-align:center;

animation:show .3s;

}

.circle{

width:100px;

height:100px;

margin:auto;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:55px;

color:white;

margin-bottom:25px;

}

.popupBox h2{

font-size:38px;

margin-bottom:10px;

}

.popupBox p{

font-size:19px;

color:#666;

margin-bottom:30px;

}

.popupBox button{

font-size:18px;

}

@keyframes show{

from{

opacity:0;

transform:scale(.85);

}

to{

opacity:1;

transform:scale(1);

}

}

@media(max-width:950px){

.left{

display:none;

}

.right{

padding:40px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>

Create Surveys<br>
With Analytics

</h1>

<p>

Professional survey platform to collect responses and generate insights instantly.

</p>

<img
src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">

</div>

<div class="right">

<div class="form">

<h2>

Register

</h2>

<p class="sub">

Create your account

</p>

<div class="field">

<label>

Full Name

</label>

<input
id="name"
placeholder="Enter full name">

</div>

<div class="field">

<label>

Email Address

</label>

<input
id="email"
type="email"
placeholder="Enter email">

</div>

<div class="field">

<label>

Password

</label>

<div class="password">

<input
id="password"
type="password"
placeholder="Enter password">

<span
class="eye"
onclick="togglePassword()">

👁

</span>

</div>

</div>

<button
onclick="register()">

Create Account

</button>

<div class="bottom">

Already registered?

<a href="login.html">

Login here →

</a>

</div>

</div>

</div>

</div>


<script type="module">

import {
auth
}
from "../firebase.js";

import {
createUserWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


window.register=
async()=>{

const email=
document.getElementById(
"email"
).value.trim();

const password=
document.getElementById(
"password"
).value.trim();

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

showPopup(
"Registration Successful",
true
);

setTimeout(()=>{

location=
"login.html";

},2500);

}

catch(error){

if(
error.code===
"auth/email-already-in-use"
){

showPopup(
"This account already exists. Please login.",
false
);

}

else{

showPopup(
error.message,
false
);

}

}

};


function showPopup(msg,success){

const old=
document.getElementById(
"popup"
);

if(old){

old.remove();

}

const popup=
document.createElement(
"div"
);

popup.id=
"popup";

popup.innerHTML=`

<div class="popupBox">

<div
class="circle"

style="background:

${success

?

'#22c55e'

:

'#f59e0b'}">

${success

?

'✓'

:

'⚠'}

</div>

<h2>

${success

?

'Success'

:

'Already Registered'}

</h2>

<p>

${msg}

</p>

<button onclick="closePopup()">

${success

?

'Continue'

:

'Go Login'}

</button>

</div>

`;

document.body.appendChild(
popup);

}


window.closePopup=()=>{

document
.getElementById(
"popup"
)
?.remove();

location=
"login.html";

};


window.togglePassword=()=>{

let p=
document.getElementById(
"password"
);

p.type=

p.type==="password"

?

"text"

:

"password";

};

</script>

</body>
</html>
